<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeBlanc — Secure Code Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5ede2; color: #2c1e12; }

  .header { background: #fdf8f2; border-bottom: 1px solid #e0d0bc; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #2c1e12; }
  .header .tag { background: #7a4f2f; color: #fdf8f2; font-size: 11px; padding: 2px 8px; font-weight: 600; letter-spacing: 0.4px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
  .header-desc { color: #a08878; font-size: 13px; }
  .history-link { font-size: 12px; font-weight: 600; color: #7a4f2f; text-decoration: none; border: 1px solid #dcc9b2; padding: 4px 12px; }
  .history-link:hover { background: #f0e4d4; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  /* Prompt Section */
  .prompt-section { background: #fdf8f2; border: 1px solid #e0d0bc; padding: 24px; margin-bottom: 24px; }
  .prompt-section h2 { font-size: 11px; color: #a08878; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .prompt-row { display: flex; gap: 12px; }
  .prompt-input { flex: 1; background: #f5ede2; border: 1px solid #dcc9b2; color: #2c1e12; padding: 12px 16px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .prompt-input:focus { border-color: #9a6845; }
  .prompt-input::placeholder { color: #c0a898; }

  .btn { padding: 10px 20px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; }
  .btn-primary { background: #7a4f2f; color: #fdf8f2; }
  .btn-primary:hover { background: #5e3a22; }
  .btn-primary:disabled { background: #e0d0bc; color: #b8a898; cursor: wait; }

  .demo-prompts { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .demo-chip { background: #f0e4d4; border: 1px solid #dcc9b2; color: #8a6a55; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: 0.15s; }
  .demo-chip:hover { border-color: #9a6845; color: #5e3a22; background: #e8d8c4; }

  /* Status */
  .status-bar { background: #fdf8f2; border: 1px solid #e0d0bc; padding: 16px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .spinner { width: 18px; height: 18px; border: 2px solid #e0d0bc; border-top-color: #9a6845; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text { color: #a08878; font-size: 14px; }

  /* Results Grid */
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .model-card { background: #fdf8f2; border: 1px solid #e0d0bc; overflow: hidden; }
  .model-header { padding: 16px 20px; border-bottom: 1px solid #e0d0bc; display: flex; justify-content: space-between; align-items: center; background: #faf3ea; }
  .model-name { font-size: 16px; font-weight: 600; }
  .model-name.gemini { color: #6e4fa8; }
  .model-name.groq { color: #c05c28; }

  .mode-tabs { display: flex; border-bottom: 1px solid #e0d0bc; background: #faf3ea; }
  .mode-tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; color: #a08878; border-bottom: 2px solid transparent; transition: 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
  .mode-tab:hover { color: #5e3a22; }
  .mode-tab.active { color: #7a4f2f; border-bottom-color: #7a4f2f; }

  .mode-content { padding: 16px 20px; }

  /* Stat badges */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-badge { padding: 5px 11px; font-size: 12px; font-weight: 600; }
  .stat-clean { background: #e8f4ec; color: #2e6b44; border: 1px solid #b8d9c4; }
  .stat-vuln { background: #fceae8; color: #8c3228; border: 1px solid #f0bcb4; }
  .stat-repaired { background: #fdf3d8; color: #7a5818; border: 1px solid #ecd898; }
  .stat-info { background: #e8eef8; color: #3b5e8a; border: 1px solid #bccce8; }

  /* Vulnerability list */
  .vuln-list { margin-bottom: 16px; }
  .vuln-item { background: #fdf0ec; border: 1px solid #f0ccc4; padding: 10px 14px; margin-bottom: 6px; font-size: 13px; }
  .vuln-cwe { color: #8c3228; font-weight: 700; margin-right: 8px; }
  .vuln-sev { color: #9a6818; margin-right: 8px; font-size: 11px; text-transform: uppercase; font-weight: 600; }
  .vuln-msg { color: #4a3428; }
  .vuln-line { color: #a08878; font-size: 11px; margin-top: 4px; }

  /* Code block */
  .code-block { background: #f0e4d4; border: 1px solid #dcc9b2; padding: 14px 16px; font-family: 'Consolas', 'Fira Code', monospace; font-size: 12.5px; line-height: 1.6; color: #3a2518; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

  /* Repair timeline */
  .repair-timeline { margin-bottom: 16px; }
  .repair-step { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #ecddc8; font-size: 13px; }
  .repair-step:last-child { border-bottom: none; }
  .repair-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .repair-dot.has-vulns { background: #c0503a; }
  .repair-dot.clean { background: #3a8c58; }
  .repair-label { color: #a08878; }
  .repair-count { font-weight: 600; }

  /* Enrichment preview */
  .enriched-block { background: #eef3fc; border: 1px solid #c8d8f0; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #2e4a78; white-space: pre-wrap; line-height: 1.5; }
  .enriched-label { font-size: 11px; color: #a08878; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

  .section-label { font-size: 11px; color: #a08878; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }

  /* Section header row (label + toggle button) */
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .section-header .section-label { margin-bottom: 0; }
  .toggle-btn { font-size: 10px; padding: 1px 7px; border: 1px solid #dcc9b2; background: transparent; color: #a08878; cursor: pointer; font-weight: 600; letter-spacing: 0.3px; font-family: inherit; }
  .toggle-btn:hover { border-color: #9a6845; color: #5e3a22; }
  .toggle-btn.on { background: #7a4f2f; color: #fdf8f2; border-color: #7a4f2f; }

  /* CWE triggers */
  .cwe-triggers { background: #f5ede2; border: 1px solid #dcc9b2; padding: 8px 12px; margin-bottom: 12px; }
  .cwe-trigger-row { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; border-bottom: 1px solid #ecddc8; font-size: 12px; }
  .cwe-trigger-row:last-child { border-bottom: none; }
  .cwe-keyword { font-family: 'Consolas', monospace; color: #5e3a22; font-weight: 600; }
  .cwe-arrow { color: #c0a898; }
  .cwe-id { color: #3b5e8a; font-weight: 600; }

  /* Code diff */
  .diff-block { font-family: 'Consolas', 'Fira Code', monospace; font-size: 12px; line-height: 1.5; border: 1px solid #dcc9b2; overflow-x: auto; max-height: 280px; overflow-y: auto; margin-bottom: 12px; }
  .diff-line { padding: 1px 12px; white-space: pre; }
  .diff-add { background: #d4f0dc; color: #1a5c2e; }
  .diff-remove { background: #fce4e0; color: #7a2218; }
  .diff-same { color: #8a7a70; }
  .diff-collapsed { background: #f0e4d4; color: #a08878; text-align: center; padding: 3px 12px; font-size: 11px; }
  .diff-iter-label { font-size: 11px; color: #a08878; text-transform: uppercase; letter-spacing: 0.4px; margin: 10px 0 4px; font-weight: 600; }

  /* Empty state */
  .empty-state { text-align: center; padding: 80px 40px; color: #c0a898; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #a08878; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const API = "http://localhost:5000/api";

/* ── Line-level LCS diff ── */
function computeLineDiff(oldStr, newStr) {
  const a = (oldStr || '').split('\n');
  const b = (newStr || '').split('\n');
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const diff = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      diff.unshift({ type: 'same', line: a[i-1] }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      diff.unshift({ type: 'add', line: b[j-1] }); j--;
    } else {
      diff.unshift({ type: 'remove', line: a[i-1] }); i--;
    }
  }
  return diff;
}

function DiffView({ oldCode, newCode, label }) {
  const diff = computeLineDiff(oldCode, newCode);
  const CONTEXT = 2;
  const changed = new Set();
  diff.forEach((d, i) => { if (d.type !== 'same') changed.add(i); });
  const visible = new Set();
  changed.forEach(i => {
    for (let k = Math.max(0, i - CONTEXT); k <= Math.min(diff.length - 1, i + CONTEXT); k++)
      visible.add(k);
  });
  const addCount = diff.filter(d => d.type === 'add').length;
  const removeCount = diff.filter(d => d.type === 'remove').length;

  if (addCount === 0 && removeCount === 0)
    return <div className="diff-iter-label">{label} — no changes detected</div>;

  const rows = [];
  let collapseStart = null;
  diff.forEach((d, i) => {
    if (visible.has(i)) {
      if (collapseStart !== null) {
        const cnt = i - collapseStart;
        rows.push(<div key={`c${i}`} className="diff-line diff-collapsed">··· {cnt} unchanged line{cnt !== 1 ? 's' : ''} ···</div>);
        collapseStart = null;
      }
      const cls = d.type === 'add' ? 'diff-add' : d.type === 'remove' ? 'diff-remove' : 'diff-same';
      const pfx = d.type === 'add' ? '+' : d.type === 'remove' ? '-' : ' ';
      rows.push(<div key={i} className={`diff-line ${cls}`}>{pfx} {d.line}</div>);
    } else {
      if (collapseStart === null) collapseStart = i;
    }
  });
  if (collapseStart !== null) {
    const cnt = diff.length - collapseStart;
    rows.push(<div key="cend" className="diff-line diff-collapsed">··· {cnt} unchanged line{cnt !== 1 ? 's' : ''} ···</div>);
  }
  return (
    <div>
      <div className="diff-iter-label">
        {label} &nbsp;
        <span style={{color:'#2e6b44', fontWeight:700}}>+{addCount}</span>
        {' '}
        <span style={{color:'#8c3228', fontWeight:700}}>-{removeCount}</span>
      </div>
      <div className="diff-block">{rows}</div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [prompt, setPrompt] = useState("");
  const [promptId, setPromptId] = useState("custom");
  const [demoPrompts, setDemoPrompts] = useState([]);
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [statusMsg, setStatusMsg] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const [activeTabs, setActiveTabs] = useState({ gemini: "enriched_repair", groq: "enriched_repair" });

  useEffect(() => {
    fetch(`${API}/prompts`).then(r => r.json()).then(setDemoPrompts).catch(() => {});
  }, []);

  const runPipeline = async () => {
    if (!prompt.trim()) return;
    setLoading(true);
    setResults(null);
    setErrorMsg("");

    const steps = [
      "Running Engine A — enriching prompt with CWE warnings...",
      "Calling Gemini (plain mode)...",
      "Calling Groq (plain mode)...",
      "Running Engine B — scanning with Semgrep + Bandit...",
      "Calling Gemini (enriched mode)...",
      "Calling Groq (enriched mode)...",
      "Running Engine B — scanning enriched outputs...",
      "Running Engine C — repair loop on Gemini output...",
      "Running Engine C — repair loop on Groq output...",
      "Saving results to database...",
    ];
    let stepIdx = 0;
    setStatusMsg(steps[0]);
    const interval = setInterval(() => {
      stepIdx = Math.min(stepIdx + 1, steps.length - 1);
      setStatusMsg(steps[stepIdx]);
    }, 4000);

    try {
      const res = await fetch(`${API}/compare`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt.trim(), prompt_id: promptId }),
      });
      const data = await res.json();
      if (data.error) {
        setErrorMsg(`Error: ${data.error}`);
      } else {
        setResults(data);
        setStatusMsg("");
      }
    } catch (err) {
      setErrorMsg(`Error: ${err.message}`);
    } finally {
      clearInterval(interval);
      setLoading(false);
    }
  };

  const setTab = (model, mode) => {
    setActiveTabs(prev => ({ ...prev, [model]: mode }));
  };

  return (
    <div>
      <div className="header">
        <h1>LeBlanc</h1>
        <span className="tag">PIPELINE DEMO</span>
        <div className="header-right">
          <span className="header-desc">Automated Prompt Enrichment &amp; Iterative Repair for Secure LLM-Generated Code</span>
          <a className="history-link" href="history.html">History →</a>
        </div>
      </div>

      <div className="container">
        <div className="prompt-section">
          <h2>Enter a coding prompt</h2>
          <div className="prompt-row">
            <input
              className="prompt-input"
              placeholder="e.g. Write a Flask endpoint for user login with MySQL..."
              value={prompt}
              onChange={e => { setPrompt(e.target.value); setPromptId("custom"); }}
              onKeyDown={e => e.key === "Enter" && !loading && runPipeline()}
            />
            <button className="btn btn-primary" onClick={runPipeline} disabled={loading || !prompt.trim()}>
              {loading ? "Running..." : "Run Pipeline"}
            </button>
          </div>
          <div className="demo-prompts">
            {demoPrompts.map(p => (
              <span key={p.id} className="demo-chip" onClick={() => { setPrompt(p.prompt); setPromptId(p.id); }}>
                <span style={{color:"#a08878", fontWeight:700, marginRight:5}}>{p.id}</span>
                {p.prompt.length > 55 ? p.prompt.slice(0, 55) + "..." : p.prompt}
              </span>
            ))}
          </div>
        </div>

        {loading && (
          <div className="status-bar">
            <div className="spinner" />
            <span className="status-text">{statusMsg}</span>
          </div>
        )}
        {errorMsg && !loading && (
          <div className="status-bar" style={{borderColor:"#f0bcb4", background:"#fceae8"}}>
            <span className="status-text" style={{color:"#8c3228"}}>{errorMsg}</span>
          </div>
        )}

        {results ? (
          <div className="results-grid">
            <ModelCard model="gemini" label="Gemma 4 31B" data={results.gemini} tab={activeTabs.gemini} setTab={setTab} />
            <ModelCard model="groq" label="Groq (Llama 3.3 70B)" data={results.groq} tab={activeTabs.groq} setTab={setTab} />
          </div>
        ) : !loading ? (
          <div className="empty-state">
            <h3>No results yet</h3>
            <p>Enter a prompt above or click a demo prompt to run the pipeline.</p>
          </div>
        ) : null}
      </div>
    </div>
  );
}

/* ── Model Card ── */
function ModelCard({ model, label, data, tab, setTab }) {
  const [showCweTriggers, setShowCweTriggers] = useState(false);
  const [showCodeDelta, setShowCodeDelta] = useState(false);

  if (!data) return null;

  const modes = [
    { key: "plain", label: "Plain" },
    { key: "enriched", label: "Enriched" },
    { key: "enriched_repair", label: "Enriched + Repair" },
  ];

  const current = data[tab];
  if (!current) return (
    <div className="model-card">
      <div className="model-header"><span className={`model-name ${model}`}>{label}</span></div>
      <div className="mode-content"><p style={{ color: "#a08878" }}>No data</p></div>
    </div>
  );

  if (current.error) return (
    <div className="model-card">
      <div className="model-header"><span className={`model-name ${model}`}>{label}</span></div>
      <div className="mode-content"><p style={{ color: "#8c3228" }}>Error: {current.error}</p></div>
    </div>
  );

  const vulns = current.scan_results || [];
  const repairResult = current.repair_result || {};
  const iterations = repairResult.iterations || [];
  const kwPairs = current.keyword_cwe_pairs || [];

  // Build code snapshots for delta view: [initial, iter1, iter2, ...]
  const codeSnapshots = [current.clean_code || ""];
  iterations.forEach(it => codeSnapshots.push(it.code || ""));

  return (
    <div className="model-card">
      <div className="model-header">
        <span className={`model-name ${model}`}>{label}</span>
        <span className={`stat-badge ${current.vuln_count === 0 ? "stat-clean" : "stat-vuln"}`}>
          {current.vuln_count === 0 ? "CLEAN" : `${current.vuln_count} VULN${current.vuln_count > 1 ? "S" : ""}`}
        </span>
      </div>

      <div className="mode-tabs">
        {modes.map(m => (
          <div key={m.key} className={`mode-tab ${tab === m.key ? "active" : ""}`} onClick={() => setTab(model, m.key)}>
            {m.label}
            {data[m.key] && !data[m.key].error && (
              <span style={{ marginLeft: 6 }}>
                ({data[m.key].vuln_count === 0 ? "✓" : data[m.key].vuln_count})
              </span>
            )}
          </div>
        ))}
      </div>

      <div className="mode-content">
        {/* Stats */}
        <div className="stats-row">
          <span className={`stat-badge ${vulns.length === 0 ? "stat-clean" : "stat-vuln"}`}>
            {vulns.length} finding{vulns.length !== 1 ? "s" : ""} after scan
          </span>
          {current.final_status === "clean" && tab === "enriched_repair" && current.total_iterations > 0 && (
            <span className="stat-badge stat-repaired">Repaired in {current.total_iterations} iteration{current.total_iterations > 1 ? "s" : ""}</span>
          )}
          {current.final_status === "not_converged" && (
            <span className="stat-badge stat-vuln">Did not converge after {current.total_iterations} iterations</span>
          )}
          {current.matched_cwes && current.matched_cwes.length > 0 && (
            <span className="stat-badge stat-info">{current.matched_cwes.join(", ")}</span>
          )}
        </div>

        {/* Enriched prompt + CWE triggers toggle */}
        {tab !== "plain" && current.enriched_prompt && current.enriched_prompt !== current.prompt_text && (
          <div>
            <div className="section-header">
              <span className="enriched-label">Engine A — Enriched Prompt</span>
              {kwPairs.length > 0 && (
                <button
                  className={`toggle-btn ${showCweTriggers ? "on" : ""}`}
                  onClick={() => setShowCweTriggers(v => !v)}
                >
                  CWE Triggers
                </button>
              )}
            </div>
            {showCweTriggers && kwPairs.length > 0 && (
              <div className="cwe-triggers">
                {kwPairs.map((p, i) => (
                  <div key={i} className="cwe-trigger-row">
                    <span className="cwe-keyword">"{p.keyword}"</span>
                    <span className="cwe-arrow">→</span>
                    <span className="cwe-id">{p.cwes.join(", ")}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="enriched-block">{current.enriched_prompt}</div>
          </div>
        )}

        {/* Vulnerabilities */}
        {vulns.length > 0 && (
          <div>
            <div className="section-label">Engine B — Vulnerabilities Found</div>
            <div className="vuln-list">
              {vulns.map((v, i) => (
                <div key={i} className="vuln-item">
                  <span className="vuln-cwe">{(v.cwes || []).join(", ")}</span>
                  <span className="vuln-sev">{v.severity}</span>
                  <span className="vuln-msg">{v.message}</span>
                  <div className="vuln-line">Line {v.line} · {v.tool}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Repair timeline + code delta toggle */}
        {iterations.length > 0 && (
          <div>
            <div className="section-header">
              <span className="section-label" style={{marginBottom:0}}>Engine C — Repair Timeline</span>
              <button
                className={`toggle-btn ${showCodeDelta ? "on" : ""}`}
                onClick={() => setShowCodeDelta(v => !v)}
              >
                Code Delta
              </button>
            </div>
            <div className="repair-timeline">
              <div className="repair-step">
                <div className="repair-dot has-vulns" />
                <span className="repair-label">Initial scan:</span>
                <span className="repair-count" style={{ color: "#8c3228" }}>{vulns.length} vulnerabilities</span>
              </div>
              {iterations.map((it, i) => (
                <div key={i} className="repair-step">
                  <div className={`repair-dot ${it.vulns_after === 0 ? "clean" : "has-vulns"}`} />
                  <span className="repair-label">Iteration {it.iteration}:</span>
                  <span className="repair-count" style={{ color: it.vulns_after === 0 ? "#2e6b44" : "#8c3228" }}>
                    {it.vulns_before} → {it.vulns_after} vulnerabilities
                  </span>
                </div>
              ))}
            </div>
            {showCodeDelta && codeSnapshots.length > 1 && (
              <div>
                {iterations.map((it, i) => (
                  <DiffView
                    key={i}
                    oldCode={codeSnapshots[i]}
                    newCode={codeSnapshots[i + 1]}
                    label={`Iteration ${it.iteration}`}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* Generated code */}
        <div className="section-label">Generated Code</div>
        <div className="code-block">
          {(tab === "enriched_repair" && repairResult.final_code) ? repairResult.final_code : (current.clean_code || current.generated_code || "No code generated")}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
